services:
  api:
    build:
      context: ./server
    container_name: jijin-show-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    container_name: jijin-show-web
    ports:
      - "5173:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
